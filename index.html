<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpinGamma | Ecosistema Tecnológico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ui-bg-oscuro': 'var(--ui-bg-oscuro)',       
                        'ui-bg-claro': 'var(--ui-bg-claro)',         
                        'ui-titulo-oscuro': 'var(--ui-titulo-oscuro)', 
                        'ui-parrafo-oscuro': 'var(--ui-parrafo-oscuro)', 
                        'ui-btn-bg': 'var(--ui-btn-bg)',
                        'ui-btn-text': 'var(--ui-btn-text)',
                        'ui-nav-text': 'var(--ui-nav-text)',
                        'ui-logo-spin': 'var(--ui-logo-spin)',
                        'ui-logo-gamma': 'var(--ui-logo-gamma)',
                        'sg-border-light': 'var(--sg-border-light)',
                        
                        /* COLORES TARJETAS PLANES */
                        'ui-tarj-tit': 'var(--ui-tarj-tit)',
                        'ui-tarj-precio': 'var(--ui-tarj-precio)'
                    },
                    fontFamily: {
                        serif: ['var(--font-titulos)', 'serif'],
                        sans: ['var(--font-parrafos)', 'sans-serif'],
                        /* NUEVAS FUENTES */
                        menu: ['var(--font-menu)', 'sans-serif'],
                        tarjetas: ['var(--font-tarjetas)', 'serif']
                    }
                }
            }
        }
    </script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--ui-bg-oscuro); color: var(--ui-desc); font-family: var(--font-parrafos), sans-serif; -webkit-font-smoothing: antialiased; }
        h1, h2, h3, .font-serif { font-family: var(--font-titulos), serif; }
        #app-container { position: relative; width: 100vw; height: 100dvh; }
        
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; visibility: hidden; transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1), transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(30px); display: flex; align-items: flex-start; justify-content: center; padding-top: 100px; }
        @media (min-width: 768px) { .slide { align-items: center; padding-top: 0; } }
        
        .slide.active { opacity: 1; visibility: visible; transform: translateY(0); z-index: 10; }
        .slide.prev-slide { transform: translateY(-30px); }

        /* LÍNEA DIVISORIA DEL MENÚ PARAMETRIZADA */
        nav { transition: all 0.4s ease; border-bottom: 3px solid var(--ui-linea-menu); background-color: var(--ui-bg-oscuro); z-index: 50; }
        
        .nav-link { position: relative; opacity: 0.7; transition: opacity 0.3s ease; outline: none; color: var(--ui-nav-text); }
        .nav-link:hover, .nav-link.active-link { opacity: 1; color: var(--ui-nav-text); }
        
        /* BOTONES DE MENÚ (Desktop y Mobile) PARAMETRIZADOS */
        .btn-nav-contacto { border: 2px solid var(--ui-nav-cta-border); color: var(--ui-nav-cta-text); background-color: transparent; }
        .btn-nav-contacto:hover { background-color: var(--ui-nav-cta-hover-bg); color: var(--ui-nav-cta-hover-text); border-color: var(--ui-nav-cta-hover-bg); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Modal del Video */
        #video-modal { background-color: rgba(0,0,0,0.9); backdrop-filter: blur(5px); z-index: 100; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        #video-modal.active { opacity: 1; visibility: visible; }

        /* Animaciones para cambio de TABS */
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav class="fixed top-0 left-0 w-full flex flex-col md:flex-row md:justify-between md:items-center px-5 md:px-16 py-3 md:py-4" id="navbar">

        <div id="menu-container" class="w-full md:w-auto mt-4 md:mt-0 overflow-x-auto no-scrollbar flex items-center gap-6 md:gap-8 uppercase tracking-widest font-bold pb-2 md:pb-0 font-menu">
            <button onclick="goToSlide(0)" class="nav-link flex-shrink-0" data-target="0" id="ui-nav-1"></button>
            <button onclick="goToSlide(1)" class="nav-link flex-shrink-0" data-target="1" id="ui-nav-2"></button>

            <button onclick="goToSlide(5)" class="nav-link flex-shrink-0" data-target="5" id="ui-nav-6"></button>
            
            <a href="#" target="_blank" class="btn-nav-contacto js-wa-link hidden md:inline-flex px-6 py-2 rounded-full transition-all duration-300 text-xs font-bold tracking-widest ml-4 shadow-sm uppercase">

        <button onclick="goToSlide(5)" class="dot w-2.5 h-2.5 rounded-full opacity-30 transition-all duration-300 hover:opacity-100" data-target="5"></button>
    </div>

    <div id="video-modal" class="fixed inset-0 flex items-center justify-center p-4 md:p-10" onclick="closeVideoModal(event)">

    <script>
        const setHTML = (id, htmlContent) => { const el = document.getElementById(id); if (el) el.innerHTML = htmlContent; };
        const setImg = (id, src) => { const el = document.getElementById(id); if(el) el.src = src; };

        // =========================================================================
        // ⚙️ PANEL DE CONTROL MAESTRO (EDITA TODO DESDE AQUÍ)
        // =========================================================================
        const GLOBAL_CONFIG = {
            
            // ==========================================
            // TIPOGRAFÍA Y TAMAÑOS
            // ==========================================
            tipografia: {
                fuenteTitulos: "Playfair Display",
                fuenteParrafos: "Inter",
                fuenteMenu: "Inter",          
                fuenteTarjetas: "Playfair Display", 
                urlGoogleFonts: "https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap",
                
                tamanos: {
                    menu: "text-xs md:text-sm",                      
                    titulos: "text-3xl md:text-5xl lg:text-6xl",     
                    tarjetaTitulo: "text-xl md:text-2xl",            
                    tarjetaPrecio: "text-4xl md:text-5xl lg:text-6xl"
                }
            },
            
            // ==========================================
            // EDICIÓN ABSOLUTA DE COLORES 
            // ==========================================

        // LÓGICA DE TABS
        function toggleTab(seccion, tab) {
            const contentInfo = document.getElementById(`content-${seccion}-info`);
            const contentPlanes = document.getElementById(`content-${seccion}-planes`);
            const tabInfo = document.getElementById(`tab-${seccion}-info`);
            const tabPlanes = document.getElementById(`tab-${seccion}-planes`);

            if(!contentInfo || !contentPlanes) return;

            if (tab === 'info') {
                contentInfo.classList.remove('hidden');
                contentInfo.classList.add('flex');
                contentPlanes.classList.add('hidden');
                contentPlanes.classList.remove('grid'); 
                
                tabInfo.classList.add('bg-ui-btn-bg', 'text-ui-btn-text');
                tabInfo.classList.remove('text-ui-desc', 'hover:bg-white/50', 'opacity-70');
                
                tabPlanes.classList.remove('bg-ui-btn-bg', 'text-ui-btn-text');
                tabPlanes.classList.add('text-ui-desc', 'hover:bg-white/50', 'opacity-70');
            } else {
                contentInfo.classList.add('hidden');
                contentInfo.classList.remove('flex');
                contentPlanes.classList.remove('hidden');
                contentPlanes.classList.add('grid');
                
                tabPlanes.classList.add('bg-ui-btn-bg', 'text-ui-btn-text');
                tabPlanes.classList.remove('text-ui-desc', 'hover:bg-white/50', 'opacity-70');
                
                tabInfo.classList.remove('bg-ui-btn-bg', 'text-ui-btn-text');
                tabInfo.classList.add('text-ui-desc', 'hover:bg-white/50', 'opacity-70');
            }
        }

        // NAVEGACIÓN Y SCROLL
        const slides = document.querySelectorAll('.slide');
        const navLinks = document.querySelectorAll('.nav-link');
        const totalSlides = slides.length; 
        let currentSlide = 0;
        let isAnimating = false;

        function goToSlide(index) {
            if (isAnimating || index === currentSlide || index < 0 || index >= totalSlides) return;
            isAnimating = true;
            slides[currentSlide].classList.remove('active');
            if (index > currentSlide) { slides[currentSlide].classList.add('prev-slide'); } 
            else { slides[currentSlide].classList.remove('prev-slide'); }
            
            currentSlide = index;
            slides.forEach((slide, i) => { if(i !== currentSlide) slide.classList.remove('active'); });
            slides[currentSlide].classList.remove('prev-slide');
            slides[currentSlide].classList.add('active');
            
            updateNav();
            setTimeout(() => { isAnimating = false; }, 800);
        }

        function updateNav() {
            const navDots = document.querySelectorAll('.dot');
            navDots.forEach(dot => {
                if (parseInt(dot.dataset.target) === currentSlide) {
                    dot.style.opacity = '1';
                    dot.style.transform = 'scale(1.3)';
                    dot.style.backgroundColor = GLOBAL_CONFIG.coloresUI.botonFondo; 
                } else {
                    dot.style.opacity = '0.3';
                    dot.style.transform = 'scale(1)';
                    dot.style.backgroundColor = GLOBAL_CONFIG.coloresUI.tituloColorPrincipal; 
                }
            });

            navLinks.forEach(link => {
                link.classList.remove('active-link');
                if (parseInt(link.dataset.target) === currentSlide) {
                    link.classList.add('active-link');
                }
            });
        }

        // MODALES
        const modal = document.getElementById('video-modal');
        const modalPlayer = document.getElementById('modal-player');

        function openVideoModal() {
            modalPlayer.classList.remove('hidden');

            modalPlayer.load();
            modal.classList.add('active');
            modalPlayer.play();
        }

        function openMediaModal(type) {
            if(type === 'image'){
                modalPlayer.classList.add('hidden');
                modalPlayer.pause();
                
                const imgPreview = document.createElement('img');
                imgPreview.src = GLOBAL_CONFIG.imagenes.imgLanding;
                imgPreview.id = 'modal-temp-img';
                imgPreview.className = 'w-full h-full object-contain bg-[#152633] absolute top-0 left-0';
                
                modalPlayer.parentElement.appendChild(imgPreview);
                modal.classList.add('active');
            }
        }

        function closeVideoModal(event) {
            if(event) event.stopPropagation(); 
            modal.classList.remove('active');
            
            modalPlayer.pause(); 
            modalPlayer.currentTime = 0; 
            modalPlayer.querySelector('source').src = ""; 
            
            const tempImg = document.getElementById('modal-temp-img');
            if(tempImg) tempImg.remove();
        }

        window.addEventListener('wheel', (e) => {
            if(modal.classList.contains('active')) return; 
            if (e.target.closest('.scroll-area') || e.target.closest('.grid')) return; 
            const isHorizontalScroll = Math.abs(e.deltaX) > Math.abs(e.deltaY);
            if(!isHorizontalScroll) {
                if (e.deltaY > 0) goToSlide(currentSlide + 1);
                else if (e.deltaY < 0) goToSlide(currentSlide - 1);
            }
        });

        let touchStartY = 0; let touchEndY = 0; let touchStartX = 0; let touchEndX = 0; let touchTarget = null;
        window.addEventListener('touchstart', e => { touchStartY = e.changedTouches[0].screenY; touchStartX = e.changedTouches[0].screenX; touchTarget = e.target; }, {passive: true});
        window.addEventListener('touchend', e => {
            if(modal.classList.contains('active')) return; 
            touchEndY = e.changedTouches[0].screenY; touchEndX = e.changedTouches[0].screenX;
            if (touchTarget && (touchTarget.closest('.scroll-area') || touchTarget.closest('.grid'))) return; 
            const swipeThreshold = 50; const yDiff = touchStartY - touchEndY; const xDiff = touchStartX - touchEndX;
            if (Math.abs(yDiff) > Math.abs(xDiff)) {
                if (yDiff > swipeThreshold) { goToSlide(currentSlide + 1); } 
                else if (yDiff < -swipeThreshold) { goToSlide(currentSlide - 1); }
            }
        }, {passive: true});

        window.addEventListener('keydown', (e) => {
            if(modal.classList.contains('active')) {
                if(e.key === 'Escape') closeVideoModal(); 
                return;
            }
            if (e.key === 'ArrowDown') goToSlide(currentSlide + 1);
            if (e.key === 'ArrowUp') goToSlide(currentSlide - 1);
        });

        updateNav();
