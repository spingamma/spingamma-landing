<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">Cargando... - Tarjeta Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        amarilloClaro: '#FDF499',
                        amarilloOscuro: '#EEDA84',
                        azulPlomo: '#2C323E',
                        azulClaro: '#414C62',
                        azulMarino: '#162453',
                        plomoClaro: '#C1C0BC',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&display=swap');
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #162453; 
            background-image: 
                radial-gradient(at 20% 20%, rgba(44, 50, 62, 0.9) 0, transparent 60%), 
                radial-gradient(at 80% 80%, rgba(65, 76, 98, 0.5) 0, transparent 50%);
        }
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        .animate-pulse-slow { animation: pulse-slow 10s ease-in-out infinite; }
    </style>
</head>

        <p class="text-[0.60rem] tracking-[0.2em] uppercase text-plomoClaro/50 mt-auto pt-8 pb-2">

    <div id="modal-qr" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-azulMarino/80 backdrop-blur-md" onclick="toggleQR()"></div>
        <div class="relative bg-azulPlomo border border-plomoClaro/30 p-8 rounded-[2.5rem] shadow-2xl flex flex-col items-center max-w-[300px] fade-in">
            <button onclick="toggleQR()" class="absolute top-4 right-4 text-plomoClaro/50 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <p class="text-amarilloClaro text-xs uppercase tracking-[0.2em] mb-6 font-semibold">GitHub QR</p>
            <div class="bg-white p-3 rounded-2xl shadow-inner">

            </div>
            <p class="text-plomoClaro text-[0.7rem] mt-6 text-center leading-relaxed">Escanea para visitar mi perfil profesional de GitHub</p>
        </div>
