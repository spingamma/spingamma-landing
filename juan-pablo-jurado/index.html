<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">Tarjeta Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { fondoDark: '#121212', oro: '#E9CE3F', oroOscuro: '#B59B27' },
                    fontFamily: { serif: ['Cinzel', 'serif'] }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Cinzel', serif; 
            background-color: #121212; 
        }
        
        /* Pantalla de Carga (Throbber) */
        #loader {
            position: fixed;
            inset: 0;
            background: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.6s ease;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(233, 206, 63, 0.1);
            border-top: 3px solid #E9CE3F;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Estilo de Botones Redondos Elegantes */
        .btn-social {
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 1px solid rgba(233, 206, 63, 0.2);
            box-shadow: 4px 4px 8px #080808, -2px -2px 6px #1c1c1c;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .btn-social:active {
            box-shadow: inset 2px 2px 5px #080808, inset -2px -2px 5px #1c1c1c;
            transform: scale(0.95);
        }
        .btn-social svg { filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.5)); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        #main-card { opacity: 0; transition: opacity 0.8s ease; }
        #main-card.loaded { opacity: 1; }
    </style>
</head>
<body class="h-[100dvh] flex items-center justify-center p-4 relative overflow-hidden text-white">

    <div id="loader">
        <div class="spinner mb-4"></div>
        <p class="text-oro text-[0.6rem] tracking-[0.3em] uppercase">Sincronizando Perfil...</p>
    </div>

    <div id="main-card" class="relative z-10 w-full max-w-sm h-full max-h-[850px] bg-transparent p-6 flex flex-col items-center overflow-y-auto no-scrollbar">

            <a id="link-location" href="#" target="_blank" class="btn-social w-14 h-14 rounded-full text-oro">

            Agendar Consulta Profesional

        <p class="text-[0.55rem] tracking-[0.4em] font-sans uppercase text-gray-600 mt-6 pb-2 z-10">
            © <span id="year">2026</span> SPINGAMMA
        </p>
    </div>

    <div id="modal-qr" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm" onclick="toggleQR()">
        <div class="relative bg-[#1a1a1a] border border-oro/30 p-8 rounded-2xl flex flex-col items-center max-w-[300px]" onclick="event.stopPropagation()">
            <p class="text-oro text-[0.6rem] tracking-widest uppercase mb-6 font-bold">Código QR Profesional</p>
            <div class="bg-white p-3 rounded-lg"><img id="img-qr-dinamico" src="" class="w-44 h-44"></div>
            <button onclick="toggleQR()" class="mt-6 text-gray-500 text-[0.6rem] uppercase tracking-widest">Cerrar</button>
        </div>
    </div>

    <script>
        const CLIENTE_ID = "spingamma";
        
        // Manejo Inteligente de Carga
        const imgPerfil = document.getElementById('profile-img');
        let loaderRemovido = false;

        function ocultarLoader() {
            if (loaderRemovido) return;
            loaderRemovido = true;
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-card').classList.add('loaded');
            }, 600);
        }

        // El loader desaparecerá SOLO cuando la imagen termine de descargarse
        imgPerfil.addEventListener('load', ocultarLoader);

        // Respaldo de seguridad por si falla la conexión (quita el loader a los 6 segundos)
        setTimeout(ocultarLoader, 6000);

        function toggleQR() {
            const modal = document.getElementById('modal-qr');
            modal.classList.toggle('hidden');
            const imgQr = document.getElementById('img-qr-dinamico');
            const urlActual = encodeURIComponent(window.location.href);
            imgQr.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${urlActual}&color=121212&bgcolor=FFFFFF`;
        }
    </script>
    <script src="../conexion.js"></script>
</body>
</html>
